<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Highway Racer</title>
  <style>
    body {
      margin: 0;
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #0ff;
      font-family: monospace;
      flex-direction: column;
    }
    canvas {
      border: 2px solid #0ff;
      background: #050510;
      box-shadow: 0 0 20px #0ff;
    }
    #info {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<div id="info">
  Arrow keys to drive • Avoid traffic • Refresh to restart
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const roadWidth = 260;
  const laneCount = 3;
  const laneWidth = roadWidth / laneCount;
  const roadX = (canvas.width - roadWidth) / 2;

  const player = {
    x: roadX + laneWidth * 1 + laneWidth / 2,
    y: canvas.height - 80,
    width: 30,
    height: 50,
    speed: 0,
    maxSpeed: 7,
    accel: 0.2,
    friction: 0.05,
    turnSpeed: 4
  };

  let keys = {};
  let traffic = [];
  let roadOffset = 0;
  let score = 0;
  let gameOver = false;

  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  function spawnTraffic() {
    const lane = Math.floor(Math.random() * laneCount);
    const car = {
      x: roadX + laneWidth * lane + laneWidth / 2,
      y: -60,
      width: 30,
      height: 50,
      speed: 3 + Math.random() * 3,
      color: `hsl(${Math.random()*360}, 100%, 60%)`
    };
    traffic.push(car);
  }

  function updatePlayer() {
    if (keys['arrowup'] || keys['w']) {
      player.speed += player.accel;
    } else if (keys['arrowdown'] || keys['s']) {
      player.speed -= player.accel;
    } else {
      if (player.speed > 0) player.speed -= player.friction;
      if (player.speed < 0) player.speed += player.friction;
    }

    if (player.speed > player.maxSpeed) player.speed = player.maxSpeed;
    if (player.speed < -player.maxSpeed / 2) player.speed = -player.maxSpeed / 2;

    if (keys['arrowleft'] || keys['a']) {
      player.x -= player.turnSpeed;
    }
    if (keys['arrowright'] || keys['d']) {
      player.x += player.turnSpeed;
    }

    const minX = roadX + player.width / 2;
    const maxX = roadX + roadWidth - player.width / 2;
    if (player.x < minX) player.x = minX;
    if (player.x > maxX) player.x = maxX;

    player.y -= player.speed * 0.3;
    if (player.y < canvas.height - 120) player.y = canvas.height - 120;
    if (player.y > canvas.height - 40) player.y = canvas.height - 40;
  }

  function updateTraffic() {
    for (let car of traffic) {
      car.y += car.speed;
    }
    traffic = traffic.filter(car => car.y < canvas.height + 60);

    if (Math.random() < 0.03) {
      spawnTraffic();
    }
  }

  function checkCollisions() {
    for (let car of traffic) {
      if (Math.abs(player.x - car.x) < (player.width + car.width) / 2 &&
          Math.abs(player.y - car.y) < (player.height + car.height) / 2) {
        gameOver = true;
      }
    }
  }

  function drawRoad() {
    ctx.fillStyle = '#111522';
    ctx.fillRect(roadX, 0, roadWidth, canvas.height);

    ctx.fillStyle = '#0ff';
    ctx.fillRect(roadX - 4, 0, 4, canvas.height);
    ctx.fillRect(roadX + roadWidth, 0, 4, canvas.height);

    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 20]);
    roadOffset += player.speed * 2;
    ctx.lineDashOffset = roadOffset;

    for (let i = 1; i < laneCount; i++) {
      const x = roadX + laneWidth * i;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawCar(x, y, w, h, color, glow) {
    ctx.save();
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
    }
    ctx.fillStyle = color;
    ctx.fillRect(x - w/2, y - h/2, w, h);

    ctx.fillStyle = '#222';
    ctx.fillRect(x - w/2 + 4, y - h/2 + 4, w - 8, h/2);

    ctx.fillStyle = '#0ff';
    ctx.fillRect(x - w/2 + 4, y + h/2 - 8, 8, 6);
    ctx.fillRect(x + w/2 - 12, y + h/2 - 8, 8, 6);
    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = '#0ff';
    ctx.font = '16px monospace';
    ctx.fillText('SCORE: ' + Math.floor(score), 10, 20);
    ctx.fillText('SPEED: ' + Math.abs(player.speed).toFixed(1), 10, 40);

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, canvas.height/2 - 60, canvas.width, 120);
      ctx.fillStyle = '#f00';
      ctx.font = '28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CRASHED', canvas.width/2, canvas.height/2 - 10);
      ctx.fillStyle = '#0ff';
      ctx.font = '16px monospace';
      ctx.fillText('Refresh the page to race again.', canvas.width/2, canvas.height/2 + 20);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver) {
      updatePlayer();
      updateTraffic();
      checkCollisions();
      score += Math.max(player.speed, 0) * 0.5;
    }

    drawRoad();

    for (let car of traffic) {
      drawCar(car.x, car.y, car.width, car.height, car.color, false);
    }

    drawCar(player.x, player.y, player.width, player.height, '#ff00ff', true);
    drawHUD();

    requestAnimationFrame(loop);
  }

  spawnTraffic();
  spawnTraffic();
  loop();
</script>
</body>
</html>
